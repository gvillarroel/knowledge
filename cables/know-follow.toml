[metadata]
name = "know-follow"
description = "Inspect items from GitHub repos and Jira projects you interacted with (last 6 months)"

[source]
command = "know browse follow --format television"
ansi = true

[preview]
command = "know browse follow --format television-preview --entry {split: :0|strip_ansi}"

[keybindings]
enter = "actions:show-url"

[actions.show-url]
description = "Resolve the selected item URL; customize this command per OS if you want to open it automatically"
command = "know browse follow-url '{}'"
mode = "execute"
