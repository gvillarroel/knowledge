[metadata]
name = "know-follow"
description = "Open items from GitHub repos and Jira projects you interacted with (last 6 months)"

[source]
command = "know browse follow --format television"
ansi = true

[preview]
command = "know browse follow --format television-preview --entry {split: :0|strip_ansi}"

[keybindings]
enter = "actions:open-in-browser"

[actions.open-in-browser]
description = "Open the selected item in the default browser"
command = "start $(know browse follow-url {split: :0|strip_ansi})"
mode = "fork"
