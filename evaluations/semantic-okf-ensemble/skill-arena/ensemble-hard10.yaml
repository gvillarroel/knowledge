    - id: q036-evaluation-leakage-and-stage-separation
      description: 'naturalistic-forward: evaluation-design'
      prompt: |-
        Answer the following research-synthesis question using only the published Semantic OKF snapshot available at `knowledge/`. Do not use the web, model memory, or guesses. If the snapshot cannot support an answer, return `answer: null` and an empty `evidence` array.
        Question: Specify an evaluation protocol that can tell retrieval success from parametric-knowledge success. It must address pipeline-stage metrics, open versus grounding-required prompts, questionable reference answers, and LLM-judge dependence; explain the failure each safeguard prevents.
        Return JSON only with top-level keys `question_id`, `answer`, and `evidence`, in that order. Set `question_id` to `q036-evaluation-leakage-and-stage-separation`. A non-null `answer` must contain `summary`, `claims`, `paper_ids`, and `citations`, in that order. Write a comparative 180-320 word `summary`. Each `claims` item must have exactly `statement` and `supporting_claim_ids`; use the exact authoritative claim record IDs that support the statement. Use sorted, unique versioned arXiv IDs in `paper_ids`. Sort `citations` by `paper_id`; each item must have exactly `paper_id` and sorted unique integer PDF `pages`. Sort `evidence` by `claim_id`; each item must have exactly `claim_id`, `concept_path`, `paper_id`, `source_path`, and sorted unique page `locators`. Every path must exist in the snapshot, and every conclusion must be traceable to the listed evidence.
