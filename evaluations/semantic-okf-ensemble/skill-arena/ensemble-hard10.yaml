            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (actual.answer === null) return false;
                const requiredPapers = ["2405.14831v3","2408.04187v2","2408.08535v1","2410.05779v3","2507.03226v3"];
                if (!requiredPapers.every((paper) => actual.answer.paper_ids.includes(paper))) return false;
                const used = new Set(actual.answer.claims.flatMap((item) => item.supporting_claim_ids));
                const evidence = new Set(actual.evidence.map((item) => item.claim_id));
                const expectedSets = [["claim-2410-05779v3-010","claim-2410-05779v3-039","claim-2410-05779v3-053"],["claim-2405-14831v3-044","claim-2405-14831v3-058"],["claim-2408-08535v1-035"],["claim-2408-04187v2-037","claim-2408-04187v2-045"],["claim-2507-03226v3-037"]];
