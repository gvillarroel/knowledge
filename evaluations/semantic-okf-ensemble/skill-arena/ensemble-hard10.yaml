    - id: q033-corruption-specific-defenses
      description: 'boundary-recovery: robustness-defense'
      prompt: |-
        Answer the following research-synthesis question using only the published Semantic OKF snapshot available at `knowledge/`. Do not use the web, model memory, or guesses. If the snapshot cannot support an answer, return `answer: null` and an empty `evidence` array.
        Question: A graph index can fail through random edge deletion, injected irrelevant or incorrect paths, or wrong and incomplete extracted triples. Match each corruption type to the strongest defense actually supported by the corpus, and explain why the three robustness claims are not interchangeable.
        Return JSON only with top-level keys `question_id`, `answer`, and `evidence`, in that order. Set `question_id` to `q033-corruption-specific-defenses`. A non-null `answer` must contain `summary`, `claims`, `paper_ids`, and `citations`, in that order. Write a comparative 180-320 word `summary`. Each `claims` item must have exactly `statement` and `supporting_claim_ids`; use the exact authoritative claim record IDs that support the statement. Use sorted, unique versioned arXiv IDs in `paper_ids`. Sort `citations` by `paper_id`; each item must have exactly `paper_id` and sorted unique integer PDF `pages`. Sort `evidence` by `claim_id`; each item must have exactly `claim_id`, `concept_path`, `paper_id`, `source_path`, and sorted unique page `locators`. Every path must exist in the snapshot, and every conclusion must be traceable to the listed evidence.
      evaluation:
        assertions:
          - type: javascript
            metric: response-contract
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (JSON.stringify(Object.keys(actual)) !== JSON.stringify(['question_id','answer','evidence'])) return false;
                if (actual.question_id !== "q033-corruption-specific-defenses" || !Array.isArray(actual.evidence)) return false;
                if (actual.answer === null) return actual.evidence.length === 0;
                if (JSON.stringify(Object.keys(actual.answer)) !== JSON.stringify(['summary','claims','paper_ids','citations'])) return false;
                const words = typeof actual.answer.summary === 'string' ? actual.answer.summary.trim().split(/\s+/).filter(Boolean).length : 0;
                if (words < 180 || words > 320 || !Array.isArray(actual.answer.claims) || actual.answer.claims.length === 0) return false;
                if (!Array.isArray(actual.answer.paper_ids) || !Array.isArray(actual.answer.citations) || actual.evidence.length === 0) return false;
                const sortedUnique = (items) => new Set(items).size === items.length && JSON.stringify([...items].sort()) === JSON.stringify(items);
                if (!actual.answer.paper_ids.every((item) => typeof item === 'string') || !sortedUnique(actual.answer.paper_ids)) return false;
