page-18"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"},"claim-2508-19855v3-052":{"concept_path":"concepts/claims-2508-19855v3/claim-2508-19855v3-052-a47b3e6152.md","locators":["PDF-page-11"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"},"claim-2508-19855v3-053":{"concept_path":"concepts/claims-2508-19855v3/claim-2508-19855v3-053-589ca68358.md","locators":["PDF-page-11"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"},"claim-2508-19855v3-054":{"concept_path":"concepts/claims-2508-19855v3/claim-2508-19855v3-054-c18972af50.md","locators":["PDF-page-1","PDF-page-14"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"},"claim-2508-19855v3-055":{"concept_path":"concepts/claims-2508-19855v3/claim-2508-19855v3-055-fa3a89969e.md","locators":["PDF-page-13","PDF-page-14"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"},"claim-2508-19855v3-056":{"concept_path":"concepts/claims-2508-19855v3/claim-2508-19855v3-056-4b3f835c18.md","locators":["PDF-page-4","PDF-page-5"],"paper_id":"2508.19855v3","source_path":"sources/claims/2508.19855v3.jsonl"}};
                for (const item of actual.evidence) {
