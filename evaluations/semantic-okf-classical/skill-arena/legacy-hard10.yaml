schemaVersion: 1
benchmark:
  id: semantic-okf-legacy-hard10-paired
  description: Paired knowledge-only control and legacy consult-skill treatment over the same pinned Semantic OKF bundle and
    ten hard synthesis questions.
  tags:
    - compare
    - semantic-okf
    - hard-questions
    - paired
    - legacy
task:
  prompts:
    - id: q031-graph-routing-boundary
      description: 'boundary-recovery: retrieval-routing'
      prompt: |-
        Answer the following research-synthesis question using only the published Semantic OKF snapshot available at `knowledge/`. Do not use the web, model memory, or guesses. If the snapshot cannot support an answer, return `answer: null` and an empty `evidence` array.
        Question: A production router must choose among question-only or standalone-model answering, basic RAG, and GraphRAG before generation. Derive an evidence-based decision boundary for simple facts, interconnected synthesis, and noisy graph evidence, and explain why an always-use-the-graph policy is unsupported.
        Return JSON only with top-level keys `question_id`, `answer`, and `evidence`, in that order. Set `question_id` to `q031-graph-routing-boundary`. A non-null `answer` must contain `summary`, `claims`, `paper_ids`, and `citations`, in that order. Write a comparative 180-320 word `summary`. Each `claims` item must have exactly `statement` and `supporting_claim_ids`; use the exact authoritative claim record IDs that support the statement. Use sorted, unique versioned arXiv IDs in `paper_ids`. Sort `citations` by `paper_id`; each item must have exactly `paper_id` and sorted unique integer PDF `pages`. Sort `evidence` by `claim_id`; each item must have exactly `claim_id`, `concept_path`, `paper_id`, `source_path`, and sorted unique page `locators`. Every path must exist in the snapshot, and every conclusion must be traceable to the listed evidence.
      evaluation:
        assertions:
          - type: javascript
            metric: response-contract
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (JSON.stringify(Object.keys(actual)) !== JSON.stringify(['question_id','answer','evidence'])) return false;
                if (actual.question_id !== "q031-graph-routing-boundary" || !Array.isArray(actual.evidence)) return false;
                if (actual.answer === null) return actual.evidence.length === 0;
                if (JSON.stringify(Object.keys(actual.answer)) !== JSON.stringify(['summary','claims','paper_ids','citations'])) return false;
                const words = typeof actual.answer.summary === 'string' ? actual.answer.summary.trim().split(/\s+/).filter(Boolean).length : 0;
                if (words < 180 || words > 320 || !Array.isArray(actual.answer.claims) || actual.answer.claims.length === 0) return false;
                if (!Array.isArray(actual.answer.paper_ids) || !Array.isArray(actual.answer.citations) || actual.evidence.length === 0) return false;
                const sortedUnique = (items) => new Set(items).size === items.length && JSON.stringify([...items].sort()) === JSON.stringify(items);
                if (!actual.answer.paper_ids.every((item) => typeof item === 'string') || !sortedUnique(actual.answer.paper_ids)) return false;
                for (const claim of actual.answer.claims) {
                  if (JSON.stringify(Object.keys(claim)) !== JSON.stringify(['statement','supporting_claim_ids'])) return false;
                  if (typeof claim.statement !== 'string' || !claim.statement.trim() || !Array.isArray(claim.supporting_claim_ids) || !sortedUnique(claim.supporting_claim_ids)) return false;
                }
                const cited = actual.answer.citations.map((item) => item.paper_id);
                if (!sortedUnique(cited)) return false;
                for (const item of actual.answer.citations) {
                  if (JSON.stringify(Object.keys(item)) !== JSON.stringify(['paper_id','pages'])) return false;
                  if (!actual.answer.paper_ids.includes(item.paper_id) || !Array.isArray(item.pages) || item.pages.length === 0) return false;
                  if (new Set(item.pages).size !== item.pages.length || JSON.stringify([...item.pages].sort((a,b) => a-b)) !== JSON.stringify(item.pages)) return false;
                  if (!item.pages.every((page) => Number.isInteger(page) && page > 0)) return false;
                }
                const evidenceIds = actual.evidence.map((item) => item.claim_id);
                if (!sortedUnique(evidenceIds)) return false;
                return actual.evidence.every((item) =>
                  JSON.stringify(Object.keys(item)) === JSON.stringify(['claim_id','concept_path','paper_id','source_path','locators']) &&
                  typeof item.claim_id === 'string' && typeof item.concept_path === 'string' && typeof item.paper_id === 'string' &&
                  typeof item.source_path === 'string' && Array.isArray(item.locators) && sortedUnique(item.locators)
                );
              } catch { return false; }
          - type: javascript
            metric: evidence-validity
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (actual.answer === null) return false;
                const allowed = {"claim-2402-07630v3-039":{"concept_path":"concepts/claims-2402-07630v3/claim-2402-07630v3-039-d27e10fdca.md","locators":["PDF-page-8"],"paper_id":"2402.07630v3","source_path":"sources/claims/2402.07630v3.jsonl"},"claim-2503-13804v1-038":{"concept_path":"concepts/claims-2503-13804v1/claim-2503-13804v1-038-9479e2cab6.md","locators":["PDF-page-3"],"paper_id":"2503.13804v1","source_path":"sources/claims/2503.13804v1.jsonl"},"claim-2506-05690v3-043":{"concept_path":"concepts/claims-2506-05690v3/claim-2506-05690v3-043-862c0ca707.md","locators":["PDF-page-7","PDF-page-8"],"paper_id":"2506.05690v3","source_path":"sources/claims/2506.05690v3.jsonl"},"claim-2506-05690v3-044":{"concept_path":"concepts/claims-2506-05690v3/claim-2506-05690v3-044-a72d99898c.md","locators":["PDF-page-7","PDF-page-8"],"paper_id":"2506.05690v3","source_path":"sources/claims/2506.05690v3.jsonl"}};
                for (const item of actual.evidence) {
                  const expected = allowed[item.claim_id];
                  if (!expected) return false;
                  if (item.concept_path !== expected.concept_path || item.paper_id !== expected.paper_id || item.source_path !== expected.source_path) return false;
                  if (!item.locators.every((locator) => expected.locators.includes(locator))) return false;
                }
                const citedPages = new Map(actual.answer.citations.map((item) => [item.paper_id, new Set(item.pages.map((page) => `PDF-page-${page}`))]));
                return actual.evidence.every((item) => item.locators.every((locator) => citedPages.get(item.paper_id)?.has(locator)));
              } catch { return false; }
          - type: javascript
            metric: atomic-answer-completeness
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (actual.answer === null) return false;
                const requiredPapers = ["2402.07630v3","2503.13804v1","2506.05690v3"];
                if (!requiredPapers.every((paper) => actual.answer.paper_ids.includes(paper))) return false;
                const used = new Set(actual.answer.claims.flatMap((item) => item.supporting_claim_ids));
                const evidence = new Set(actual.evidence.map((item) => item.claim_id));
                const expectedSets = [["claim-2506-05690v3-043"],["claim-2506-05690v3-044"],["claim-2402-07630v3-039"],["claim-2503-13804v1-038"]];
                return expectedSets.every((options) => options.some((claimId) => used.has(claimId) && evidence.has(claimId)));
              } catch { return false; }
          - type: javascript
            metric: important-negative-coverage
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (actual.answer === null) return false;
                const used = new Set(actual.answer.claims.flatMap((item) => item.supporting_claim_ids));
                const evidence = new Set(actual.evidence.map((item) => item.claim_id));
                const expectedSets = [["claim-2402-07630v3-039","claim-2506-05690v3-043"]];
                return expectedSets.every((options) => options.some((claimId) => used.has(claimId) && evidence.has(claimId)));
              } catch { return false; }
