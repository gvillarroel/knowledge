    metric: response-format
  - type: javascript
    metric: response-contract
    value: |
      try {
        const parsed = JSON.parse(output.trim());
        const keys = Object.keys(parsed);
        return JSON.stringify(keys) === JSON.stringify(['question_id', 'answer', 'evidence'])
          && typeof parsed.question_id === 'string'
          && Array.isArray(parsed.evidence)
          && parsed.evidence.every((item) => typeof item === 'string')
