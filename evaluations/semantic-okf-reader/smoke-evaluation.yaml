comparison:
  profiles:
  - id: no-skill
    description: Strictly isolated control with neither the reader skill nor the snapshot.
    isolation:
      inheritSystem: false
    capabilities: {}
    output:
      tags:
      - control
      - knowledge-off
      labels:
        skill_state: 'off'
        knowledge_access: 'off'
  - id: skill
    description: Strictly isolated profile with the dedicated consult-semantic-okf skill and pinned knowledge snapshot supplied
      by the active v2 overlay.
    isolation:
      inheritSystem: false
    capabilities:
      skills:
      - source:
          type: local-path
          path: evaluations/semantic-okf-reader/fixtures/workspaces/reader-v2-overlay
          skillId: consult-semantic-okf
        install:
          strategy: workspace-overlay
    output:
      tags:
      - skill
      - knowledge-on
      labels:
        skill_state: 'on'
        knowledge_access: 'on'
  variants:
  - id: pi-luna-only
    description: PI with GPT-5.6 Luna for every active v2 answer request.
    agent:
      adapter: pi
      model: openai-codex/gpt-5.6-luna
      executionMethod: command
      commandPath: bin/pi-luna.ps1
      sandboxMode: read-only
      approvalPolicy: never
      webSearchEnabled: false
      networkAccessEnabled: true
      reasoningEffort: medium
      additionalDirectories: []
      cliEnv:
        PI_MODEL_TIMEOUT_SECONDS: '240'
      config: {}
    output:
      tags:
      - pi
      - gpt-5.6-luna
      - luna-only
      - isolated
      - v2
      labels:
        variantDisplayName: PI GPT-5.6 Luna
        adapter_family: pi
        model: openai-codex/gpt-5.6-luna
        routing: luna-only
        benchmark_generation: v2
