workspace:
  sources:
  - id: isolated-base
    type: local-path
    path: evaluations/semantic-okf-reader/fixtures/workspaces/base-v2
    target: /
  setup:
    initializeGit: true
    env:
      SEMANTIC_OKF_BUNDLE: $WORKSPACE/knowledge
evaluation:
  assertions:
  - type: is-json
    metric: response-format
  - type: javascript
    metric: response-contract
    value: |
      try {
        const parsed = JSON.parse(output.trim());
        const keys = Object.keys(parsed);
        return JSON.stringify(keys) === JSON.stringify(['question_id', 'answer', 'evidence'])
          && typeof parsed.question_id === 'string'
          && Array.isArray(parsed.evidence)
          && parsed.evidence.every((item) => typeof item === 'string')
          && (parsed.answer === null ? parsed.evidence.length === 0 : parsed.evidence.length > 0);
      } catch {
        return false;
      }
  - type: javascript
    metric: evidence-path-validity
    value: |
      const normalizePath = (value) => value.replaceAll('\\', '/').replace(/^\.\//, '').replace(/^knowledge\//, '');
      try {
        const actual = JSON.parse(output.trim());
        const known = new Set(["concepts/docs-01/sources-markdown-01-retention-policy-9cac150795.md","concepts/docs-02/sources-markdown-02-onboarding-guide-939b5c2578.md","concepts/docs-03/sources-markdown-03-security-checklist-16ac98b6fd.md","concepts/docs-04/sources-markdown-04-architecture-note-fd173cfcd0.md","concepts/docs-05/sources-markdown-05-operations-runbook-c7391b5d92.md","concepts/docs-06/sources-markdown-06-research-summary-d1699510c4.md","concepts/docs-07/sources-markdown-07-product-glossary-9392656d03.md","concepts/docs-08/sources-markdown-08-incident-review-0f6970952a.md","concepts/docs-09/sources-markdown-09-accessibility-guide-7de7f69036.md","concepts/docs-10/sources-markdown-10-data-dictionary-2ca743ed16.md","concepts/people-01/person-01-a-6c0bf30ef6.md","concepts/people-01/person-01-b-a022b2c5fc.md","concepts/people-02/person-02-a-8bf7fb83fb.md","concepts/people-02/person-02-b-a1ca44440c.md","concepts/people-03/person-03-a-b8d8035a31.md","concepts/people-03/person-03-b-50318fa6ac.md","concepts/people-04/person-04-a-72fac71234.md","concepts/people-04/person-04-b-b713381bb8.md","concepts/people-05/person-05-a-68796f3e0f.md","concepts/people-05/person-05-b-aa8131b5fc.md","concepts/people-06/person-06-a-0fab4a466e.md","concepts/people-06/person-06-b-240f8e93b6.md","concepts/people-07/person-07-a-3aaf429bfc.md","concepts/people-07/person-07-b-0b32913ccd.md","concepts/people-08/person-08-a-779d3c80c2.md","concepts/people-08/person-08-b-a8a93a29d0.md","concepts/people-09/person-09-a-e4af477da5.md","concepts/people-09/person-09-b-f9a398f737.md","concepts/people-10/person-10-a-4bc5699c7b.md","concepts/people-10/person-10-b-36e600e204.md","concepts/projects-01/project-01-a-20f1c1d620.md","concepts/projects-01/project-01-b-f4ab8ac839.md","concepts/projects-02/project-02-a-6375eac1a9.md","concepts/projects-02/project-02-b-f7cf7e3a1e.md","concepts/projects-03/project-03-a-950c026250.md","concepts/projects-03/project-03-b-09f5e4ebd6.md","concepts/projects-04/p