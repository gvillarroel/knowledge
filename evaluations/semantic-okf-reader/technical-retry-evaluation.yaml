comparison:
  profiles:
  - id: skill
    description: Strictly isolated profile with the build-semantic-okf skill and pinned knowledge snapshot supplied by one
      workspace overlay.
    isolation:
      inheritSystem: false
    capabilities:
      skills:
      - source:
          type: local-path
          path: evaluations/semantic-okf-reader/fixtures/workspaces/skill-overlay
          skillId: build-semantic-okf
        install:
          strategy: workspace-overlay
    output:
      tags:
      - skill
      - knowledge-on
      labels:
        skill_state: 'on'
        knowledge_access: 'on'
  variants:
  - id: pi-openai-gpt56-luna-technical-resume
    description: PI GPT-5.6 Luna technical resume after the original Codex route exhausted its shared usage limit.
    agent:
      adapter: pi
      model: openrouter/openai/gpt-5.6-luna
      executionMethod: command
      commandPath: bin/pi-spark-luna-fallback.ps1
      sandboxMode: read-only
      approvalPolicy: never
      webSearchEnabled: false
      networkAccessEnabled: true
      reasoningEffort: low
      additionalDirectories: []
      cliEnv:
        OPENROUTER_API_KEY: $HOST_ENV:OPENROUTER_API_KEY
        PI_FALLBACK_MODEL: openrouter/openai/gpt-5.6-luna
        PI_MODEL_TIMEOUT_SECONDS: '90'
      config: {}
    output:
      tags:
      - pi
      - gpt-5.6-luna
      - technical-resume
      - isolated
      labels:
        variantDisplayName: PI GPT-5.6 Luna technical resume
        adapter_family: pi
        resume_model: openrouter/openai/gpt-5.6-luna
        resume_reason: shared-codex-usage-limit
