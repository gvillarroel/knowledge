<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Confluence round-trip system context</title>
  <desc id="desc">A page workspace flows through validation and the Confluence API to verified browser output.</desc>
  <rect width="960" height="360" fill="#f7f8f9"/>
  <g font-family="Arial, sans-serif" font-size="22" text-anchor="middle">
    <rect x="50" y="115" width="220" height="120" rx="16" fill="#deebff" stroke="#0c66e4" stroke-width="3"/>
    <text x="160" y="170" fill="#172b4d">Page workspace</text>
    <text x="160" y="202" font-size="16" fill="#44546f">storage + attachments</text>
    <path d="M285 175 H405" stroke="#44546f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="420" y="115" width="180" height="120" rx="16" fill="#e3fcef" stroke="#1f845a" stroke-width="3"/>
    <text x="510" y="170" fill="#172b4d">Validator</text>
    <text x="510" y="202" font-size="16" fill="#44546f">hashes + GT</text>
    <path d="M615 175 H705" stroke="#44546f" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="720" y="115" width="190" height="120" rx="16" fill="#fff0b3" stroke="#cf9f02" stroke-width="3"/>
    <text x="815" y="170" fill="#172b4d">Confluence</text>
    <text x="815" y="202" font-size="16" fill="#44546f">API + browser</text>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#44546f"/></marker></defs>
</svg>
