schemaVersion: 1
benchmark:
  id: graphrag-cross-paper-holdout-6-validation
  description: Validate the Semantic OKF consultation skill on six fixed GraphRAG holdout questions.
  tags:
  - graphrag
  - semantic-okf
  - cross-paper
  - pi
  - holdout
  - 6-questions
task:
  prompts:
  - id: q005-community-hierarchy
    description: 'Cross-paper GraphRAG synthesis: community-retrieval'
    prompt: |-
      Answer one cross-paper GraphRAG synthesis question. The authoritative Semantic OKF snapshot is available only when your declared capabilities provide it at `knowledge/`. Use only that snapshot; do not use the web, prior knowledge, or guesses.

      Consult the snapshot efficiently: use the ledger for discovery, SPARQL over `semantic/data.ttl` for claim-kind joins, and the cited paper concepts for page-level verification. Compare formulations across independent papers; do not treat shared analysis dimensions as proof that methods are equivalent.

      Question: How do community and hierarchical organization methods turn graph structure into answerable context? Compare their retrieval and synthesis tasks, and explain when communities help more than direct entity or chunk retrieval.

      Return JSON only with exactly these top-level keys in this order: `question_id`, `answer`, `evidence`. Set `question_id` to `q005-community-hierarchy`. If the snapshot is unavailable, return `answer: null` and an empty `evidence` array. Otherwise `answer` must be an object with exactly these keys in this order: `summary`, `dimensions`, `paper_ids`, `citations`. Write a comparative 180-300 word `summary`; do not merely list papers. Include every required controlled claim-kind ID ["limitation", "organization-synthesis", "retrieval-strategy", "task"] in sorted, unique `dimensions`; additional relevant controlled claim-kind IDs are allowed. Use sorted, unique versioned arXiv IDs in `paper_ids`. `citations` must be sorted by `paper_id`, with objects shaped exactly as `{"paper_id":"...","pages":[1,2]}` and sorted unique PDF page numbers. Cite enough independent papers to support the synthesis, with at least 4 independent papers. `evidence` must contain sorted, unique existing paths that trace to those papers; paper concepts and paper-specific claim concepts both count, and additional existing semantic artifacts are allowed.
    evaluation:
      assertions:
      - type: javascript
        metric: semantic-structure
        value: |-
          try {
            const actual = JSON.parse(output.trim());
            if (actual.question_id !== "q005-community-hierarchy" || actual.answer === null) return false;
            const expectedDimensions = ["limitation", "organization-synthesis", "retrieval-strategy", "task"];
            const focus = new Set(["2404.16130v2", "2408.08535v1", "2410.05779v3", "2506.05690v3", "2508.19855v3"]);
            const valid = new Set(["2402.07630v3", "2404.16130v2", "2405.14831v3", "2406.14550v2", "2408.04187v2", "2408.08535v1", "2409.13731v3", "2410.05779v3", "2502.14902v2", "2503.06474v2", "2503.13804v1", "2504.02112v2", "2506.05690v3", "2507.03226v3", "2508.19855v3"]);
            const dimensions = actual.answer.dimensions;
            const papers = actual.answer.paper_ids;
            if (!Array.isArray(dimensions) || !Array.isArray(papers)) return false;
            if (new Set(dimensions).size !== dimensions.length || new Set(papers).size !== papers.length) return false;
            if (JSON.stringify([...dimensions].sort()) !== JSON.stringify(dimensions)) return false;
            if (JSON.stringify([...papers].sort()) !== JSON.stringify(papers)) return false;
            if (!expectedDimensions.every((item) => dimensions.includes(item))) return false;
            if (!dimensions.every((item) => ["comparison", "efficiency-update", "evaluation", "graph-construction", "graph-representation", "limitation", "methodology", "organization-synthesis", "retrieval-strategy", "retrieval-unit", "safety-grounding", "strength", "task"].includes(item))) return false;
            if (!papers.every((item) => valid.has(item))) return false;
            return papers.filter((item) => focus.has(item)).length >= 4;
          } catch { return false; }
      - type: javascript
        metric: page-citation-grounding
        value: |-
          try {
            const actual = JSON.parse(output.trim());
            if (actual.answer === null) return false;
            const citations = actual.answer.citations;
            const focus = new Set(["2404.16130v2", "2408.08535v1", "2410.05779v3", "2506.05690v3", "2508.19855v3"]);
            const pageCounts = {"2402.07630v3": 23, "2404.16130v2": 26, "2405.14831v3": 31, "2406.14550v2": 29, "2408.04187v2": 10, "2408.08535v1": 12, "2409.13731v3": 33, "2410.05779v3": 16, "2502.14902v2": 9, "2503.06474v2": 10, "2503.13804v1": 11, "2504.02112v2": 29, "2506.05690v3": 34, "2507.03226v3": 12, "2508.19855v3": 19};
            const papers = new Set(actual.answer.paper_ids);
            if (!Array.isArray(citations) || citations.length === 0) return false;
            const cited = citations.map((item) => item.paper_id);
            if (new Set(cited).size !== cited.length || JSON.stringify([...cited].sort()) !== JSON.stringify(cited)) return false;
            for (const item of citations) {
              if (JSON.stringify(Object.keys(item)) !== JSON.stringify(['paper_id', 'pages'])) return false;
              if (!papers.has(item.paper_id) || !(item.paper_id in pageCounts)) return false;
              if (!Array.isArray(item.pages) || item.pages.length === 0 || new Set(item.pages).size !== item.pages.length) return false;
              if (JSON.stringify([...item.pages].sort((a,b) => a-b)) !== JSON.stringify(item.pages)) return false;
              if (!item.pages.every((page) => Number.isInteger(page) && page >= 1 && page <= pageCounts[item.paper_id])) return false;
            }
            return cited.filter((item) => focus.has(item)).length >= 4;
          } catch { return false; }
      - type: javascript
        metric: cross-paper-evidence
        value: |-
          const normalize = (value) => value.replaceAll('\\', '/').replace(/^\.\//, '').replace(/^knowledge\//, '');
          try {
            const actual = JSON.parse(output.trim());
            if (actual.answer === null) return false;
            const patterns = {"2404.16130v2": {"exact": "concepts/paper-2404-16130v2/sources-markdown-2404.16130v2-4bba04aa1f.md", "prefixes": ["concepts/claims-2404-16130v2/", "concepts/analysis-vocabulary/method-2404-16130v2-"]}, "2408.08535v1": {"exact": "concepts/paper-2408-08535v1/sources-markdown-2408.08535v1-2caceb0200.md", "prefixes": ["concepts/claims-2408-08535v1/", "concepts/analysis-vocabulary/method-2408-08535v1-"]}, "2410.05779v3": {"exact": "concepts/paper-2410-05779v3/sources-markdown-2410.05779v3-4671b679f0.md", "prefixes": ["concepts/claims-2410-05779v3/", "concepts/analysis-vocabulary/method-2410-05779v3-"]}, "2506.05690v3": {"exact": "concepts/paper-2506-05690v3/sources-markdown-2506.05690v3-5e183be578.md", "prefixes": ["concepts/claims-2506-05690v3/", "concepts/analysis-vocabulary/method-2506-05690v3-"]}, "2508.19855v3": {"exact": "concepts/paper-2508-19855v3/sources-markdown-2508.19855v3-0d3d427dd1.md", "prefixes": ["concepts/claims-2508-19855v3/", "concepts/analysis-vocabulary/method-2508-19855v3-"]}};
            const focus = new Set(["2404.16130v2", "2408.08535v1", "2410.05779v3", "2506.05690v3", "2508.19855v3"]);
            const normalized = actual.evidence.map(normalize);
            const citedPapers = new Set();
            for (const path of normalized) {
              for (const [paper, pattern] of Object.entries(patterns)) {
                if (path === pattern.exact || pattern.prefixes.some((prefix) => path.startsWith(prefix))) citedPapers.add(paper);
              }
            }
            return [...citedPapers].filter((paper) => focus.has(paper)).length >= 4;
          } catch { return false; }
