    - id: q029-label-gate-validity
      description: 'hard synthesis: reviewed evidence comparison and causal boundary'
      prompt: |-
        Answer the following research-synthesis question using only the published Semantic OKF snapshot available at `knowledge/`. Do not use the web, model memory, or guesses. If the snapshot cannot support an answer, return `answer: null` and an empty `evidence` array. Question: Can organic, natural, sensitive-skin, endocrine-disruptor-free, or ingredient labels lacking added hormones serve as a low-exposure gate? Contrast intervention, feminine-hygiene, hair-product, and nail-salon evidence. Return JSON only with top-level keys `question_id`, `answer`, and `evidence`, in that order. Set `question_id` to `q029-label-gate-validity`. A non-null `answer` must contain `summary`, `claims`, and `paper_ids`, in that order. Write a comparative 180-360 word summary that preserves limitations and explicitly states what evidence is still missing for causality. Each claim must contain exactly `statement` and `supporting_claim_ids`, cite exactly one reviewed claim record ID, and copy that record's reviewed `interpretation` exactly as `statement`. Sort claims by their one claim ID. Set `paper_ids` to the sorted unique canonical PMCIDs derived from the returned evidence rows. Sort `evidence` by `claim_id`; every evidence item must contain exactly `claim_id`, `concept_path`, `paper_id`, `source_path`, `evidence_locator`, and `evidence_text_sha256`. Every path, locator, and hash must be copied exactly from the snapshot.
      evaluation:
        assertions:
          - type: javascript
            metric: response-contract
            value: |-
              try {
                const actual = JSON.parse(output.trim());
                if (JSON.stringify(Object.keys(actual)) !== JSON.stringify(['question_id','answer','evidence'])) return false;
                if (actual.question_id !== 'q029-label-gate-validity' || !Array.isArray(actual.evidence)) return false;
                if (actual.answer === null) return actual.evidence.length === 0;
                if (JSON.stringify(Object.keys(actual.answer)) !== JSON.stringify(['summary','claims','paper_ids'])) return false;
                const words = typeof actual.answer.summary === 'string' ? actual.answer.summary.trim().split(/\s+/).filter(Boolean).length : 0;
                if (words < 180 || words > 360 || !Array.isArray(actual.answer.claims) || !Array.isArray(actual.answer.paper_ids)) return false;
                const sortedUnique = (items) => Array.isArray(items) && new Set(items).size === items.length && JSON.stringify([...items].sort()) === JSON.stringify(items);
                if (!sortedUnique(actual.answer.paper_ids)) return false;
                if (!actual.answer.claims.every((item) => JSON.stringify(Object.keys(item)) === JSON.stringify(['statement','supporting_claim_ids']) && typeof item.statement === 'string' && item.statement.trim() && sortedUnique(item.supporting_claim_ids))) return false;
                return actual.evidence.every((item) => JSON.stringify(Object.keys(item)) === JSON.stringify(['claim_id','concept_path','paper_id','source_path','evidence_locator','evidence_text_sha256']));
              } catch { return false; }
