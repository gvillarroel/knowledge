                const interpretations = {"claim-pmc11764522-001":"This pilot linked products used during the prior 24 hours and label-derived ingredients of concern to urinary endocrine-disrupting-chemical biomarkers in 140 reproductive-age adults in Northern Nevada.","claim-pmc11764522-002":"Except for the prespecified hypothesis, the analyses were exploratory and were not adjusted for multiple testing, so independent confirmation is required.","claim-pmc11764522-003":"Participants with higher urinary MECPP reported using more total products, with weaker evidence for exposure to more ingredients of concern.","claim-pmc11764522-004":"Participants with higher urinary methylparaben reported using more supplements.","claim-pmc11764522-005":"Women used more products, encountered more ingredients of concern, and had higher urinary MEP and methylparaben than men.","claim-pmc11764522-006":"Mobile-app product use was probably underreported, and food, dust, water, furniture, electronics, and occupational exposures were outside the study scope.","claim-pmc4016195-001":"The EARTH pregnancy analysis included women seeking infertility care who had a live birth, a urine sample, a contemporaneous product-use questionnaire, and complete covariates.","claim-pmc4016195-002":"Users of lotion, cosmetics, cologne or perfume, nail polish, sun lotion, or hair gel had 28 to 80 percent higher total molar phthalate-plus-paraben concentrations.","claim-pmc4016195-003":"Shampoo, conditioner, other hair products, and liquid soap had slightly lower total concentrations, but every confidence interval included the null.","claim-pmc4016195-004":"Estrogenicity-equivalency weighting changed the analyte ranking but remained highly correlated with the molar sum, while the sun-lotion equivalency-weighted interval included the null.","claim-pmc4016195-005":"High product users had higher concentrations of every measured metabolite and paraben, including propyl paraben 219 percent higher and MBP 61 percent