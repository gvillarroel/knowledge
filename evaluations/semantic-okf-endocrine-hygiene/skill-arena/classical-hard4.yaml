workspace:
  sources:
    - id: classical-bundle
      type: local-path
      path: evaluations/semantic-okf-endocrine-hygiene/results/runs/20260715-endocrine-builds-05/bundles/classical-a
      target: /knowledge
    - id: pi-luna-runner
      type: local-path
      path: evaluations/semantic-okf-builder/fixtures/workspaces/base/bin
      target: /bin
  setup:
    initializeGit: true
    env:
      HF_HUB_OFFLINE: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      SEMANTIC_OKF_BUNDLE: $WORKSPACE/knowledge
      TRANSFORMERS_OFFLINE: '1'
evaluation:
  assertions:
    - type: is-json
      metric: response-format
  requests: 1
  timeoutMs: 600000
  tracing: false
  maxConcurrency: 1
  noCache: true
comparison:
  profiles:
    - id: knowledge-only-control
      description: Isolated control with the pinned bundle and no declared consultation skill.
      isolation:
        inheritSystem: false
      capabilities: {}
      output:
        tags:
          - control
          - knowledge-only
        labels:
          capability: none
          causal_role: passive-control
    - id: classical-cli-consult-treatment
      description: Isolated treatment with only the classical CLI consultation skill over the same bundle.
      isolation:
        inheritSystem: false
      capabilities:
        skills:
          - source:
              type: local-path
              path: skills/consult-semantic-okf-classical
              skillId: consult-semantic-okf-classical
            install:
              strategy: workspace-overlay
      output:
        tags:
          - treatment
          - classical
          - cli
        labels:
          capability: consult-semantic-okf-classical
          causal_role: treatment
  variants:
    - id: pi-luna-only
      description: The same PI GPT-5.6 Luna route for both isolated cells.
      agent:
        adapter: pi
        model: openai-codex/gpt-5.6-luna
        executionMethod: command
        commandPath: bin/pi-luna.ps1
        sandboxMode: read-only
        approvalPolicy: never
        webSearchEnabled: false
        networkAccessEnabled: true
        reasoningEffort: medium
        additionalDirectories: []
        cliEnv:
          PI_MODEL_TIMEOUT_SECONDS: '600'
        envPassthrough:
          - SEMANTIC_OKF_PYTHON
          - SEMANTIC_OKF_HF_HUB_CACHE
        config: {}
      output:
        tags:
          - pi
          - gpt-5.6-luna
          - isolated
          - cli
        labels:
          variantDisplayName: PI GPT-5.6 Luna
