associations were larger in women with significant MEP and butyl-paraben interactions.","claim-pmc5376243-005":"The observational associations do not establish that sunscreen or mouthwash caused the biomarker increases.","claim-pmc5376243-006":"The sometimes-use category may fall outside the compounds' relevant 6-to-24-hour window, while amount, brand, month, and other product use were incompletely measured.","claim-pmc5783668-001":"The prospective EARTH analysis repeatedly measured nine phthalate metabolites and three parabens while men reported use of 14 personal-care products, using mixed models and a weighted binary score.","claim-pmc5783668-002":"Cologne or perfume and deodorant were the strongest MEP predictors, while suntan or sunblock and body lotion were the strongest paraben predictors.","claim-pmc5783668-003":"Product associations with phthalate metabolites other than MEP were weak to null and statistically nonsignificant apart from an isolated shampoo-MEHP result.","claim-pmc5783668-004":"Ten products used within six hours explained at least 70 percent of the weighted score and predicted large increases in MEP and the three parabens.","claim-pmc5783668-005":"Associations were stronger for product use within six hours than within 24 hours, consistent with short half-lives and episodic exposure.","claim-pmc5783668-006":"Frequency, quantity, product chemistry, brands, water temperature, and void timing were unavailable, and the mostly White, educated male cohort limits generalization.","claim-pmc6037613-001":"HERMOSA enrolled 100 Latina girls aged 14 to 18 years in Salinas, California, in a youth-led intervention cohort.","claim-pmc6037613-002":"Daily makeup users had higher MEP, methyl paraben, propyl paraben, and BP3 than rare or never users, and recent use of at least 20 products predicted higher propyl paraben.","claim-pmc6037613-003":"Contrary to the hypothesis, recent perfume use did not predict MEP, and several other scented products and nail polish 