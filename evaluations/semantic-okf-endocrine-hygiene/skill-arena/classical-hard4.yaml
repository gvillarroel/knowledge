c-compound levels.","claim-pmc7958867-004":"Menstrual pads had the highest modeled non-cancer hazard ratios, reaching 11 and driven mainly by n-heptane.","claim-pmc7958867-005":"Modeled cancer risk for feminine washes reached 3.3 times 10 to the minus 6, with more than 99 percent attributed to inhaled 1,4-dioxane.","claim-pmc7958867-006":"Some product groups were small, only the United States market was sampled, exposure scenarios were modeled, and non-target or nonvolatile constituents were excluded.","claim-pmc8316883-001":"Hair-product use was self-reported at four prenatal visits, gestational age came from medical records, and adjusted linear regression estimated associations.","claim-pmc8316883-002":"Black participants had a lower mean gestational age than White participants, but the contrast's confidence interval crossed zero and only 8 percent of the 154-person cohort was Black.","claim-pmc8316883-003":"Daily hair-oil use near 36 weeks was associated with 8.3 fewer gestational days after adjustment for race.","claim-pmc8316883-004":"Ever-use of oils, lotions, or leave-in conditioners and the total number of product categories were not associated with gestational age.","claim-pmc8316883-005":"Phthalate-related inflammation and paraben-related receptor or placental effects are proposed pathways, not mechanisms measured in this cohort.","claim-pmc8316883-006":"Exposure was self-reported without brands, dose, or chemical composition, and the pilot was small, incompletely adjusted, omitted other products, and excluded five early preterm deliveries from the visit-four analysis.","claim-pmc8810700-001":"PROTECT included 1,070 pregnant women in Puerto Rico with up to three visits and maternal-hormone measurements from at least one visit.","claim-pmc8810700-002":"Use of hair dyes, bleach, relaxers, and mousse was associated with significantly lower SHBG, estriol, progesterone, and testosterone during pregnancy.","claim-pmc8810700-003":"Mouthwash use was associated with higher SHBG and progesterone during pregnancy.","claim-pmc8810700-004":"Cosmetic use had small, statistically nonsignificant inverse associations with all measured thyroid hormones.","claim-pmc8810700-005":"Liquid-soap and bar-soap use was not significantly associated with any examined maternal hormone.","claim-pmc8810700-006":"Recall, unavailable duration and brand data, and inseparable maternal, fetal, and placental contributions to hormone concentrations limit interpretation.","claim-pmc8812815-001":"Six hair products used by more than 10 percent of the study population were tested in reporter-gene assays for estrogenic, androgenic, progestogenic, and glucocorticoid activity.","claim-pmc8812815-002":"Three tested hair-product samples showed estrogen agonism at 12.5 to 20 nanograms per gram estradiol-equivalent concentration.","claim-pmc8812815-003":"Five of the six tested hair-product samples showed androgen antagonism at 20 to 25 nanograms per gram androgen-equivalent concentration.","claim-pmc8812815-004":"One leave-in-conditioner sample produced no change in the estrogen assay.","claim-pmc8812815-005":"Most tested products did not list added hormones on their labels despite measured hormonal activity, while one hair oil listed placenta.","claim-pmc8812815-006":"The results cover six brands selected from 2004 to 2006 use data; formulations may have changed, active ingredients were not identified, and other brands are not represented.","claim-pmc9566193-001":"Twenty nail salons were monitored for about 72 hours with volatile-organic-compound badges, and phthalates were assessed with silicone wristbands in ten salons.","claim-pmc9566193-002":"Toluene and d-limonene had the highest median volatile-organic-compound concentrations in the sampled nail salons.","claim-pmc9566193-003":"Six phthalates were detected in every salon tested for phthalates, with DEHP having the highest median silicone-wristband concentration.","claim-pmc9566193-004":"Salons providing acrylic services had significantly higher EMA concentrations than salons without acrylic services.","claim-pmc9566193-005":"Because 72-hour samples included non-business hours, the measured volatile-organic-compound averages were expected to be lower than shift-only measurements.","claim-pmc9566193-006":"This COVID-era pilot used a small convenience sample, lacked active-sampler co-location and airflow measurements, and did not verify ventilation operation or product composition.","claim-pmc9566193-007":"Twelve of twenty nail salons reported using some organic products with all-natural and organic ingredients; this was a descriptive salon characteristic, not a measured exposure comparison.","claim-pmc9764248-001":"Menstrual blood was collected from 20 women aged 25 to 45 in Accra and Cape Coast without a standardized collection protocol.","claim-pmc9764248-002":"DEP, DBP, and DEHP were detected in all 20 menstrual-blood samples, while BPA was detected in 13 samples.","claim-pmc9764248-003":"The reported DEP maximum is lower than the reported minimum, so that internally inconsistent range must not be reused as valid quantitative evidence.","claim-pmc9764248-004":"Modeled DEHP cancer risk for ingestion, inhalation, and dermal routes remained below 1 times 10 to the minus 6.","claim-pmc9764248-005":"Detection of parent phthalates in menstrual blood does not establish bioaccumulation or identify the exposure source."};
